<svg width="180" height="40" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Monochrome gradient for professional contexts -->
    <linearGradient id="monoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="20" cy="20" r="18" fill="url(#monoGradient)" opacity="0.9"/>
  
  <!-- Inner white circle -->
  <circle cx="20" cy="20" r="16" fill="white"/>
  
  <!-- Neural network pattern - monochrome -->
  <g opacity="0.8">
    <!-- Central node -->
    <circle cx="20" cy="20" r="2.5" fill="#6b7280"/>
    <!-- Outer nodes -->
    <circle cx="14" cy="14" r="2" fill="#374151"/>
    <circle cx="26" cy="14" r="2" fill="#374151"/>
    <circle cx="14" cy="26" r="2" fill="#374151"/>
    <circle cx="26" cy="26" r="2" fill="#374151"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#9ca3af" stroke-width="1" opacity="0.5" fill="none">
    <line x1="16" y1="16" x2="18.2" y2="18.2"/>
    <line x1="24" y1="16" x2="21.8" y2="18.2"/>
    <line x1="16" y1="24" x2="18.2" y2="21.8"/>
    <line x1="24" y1="24" x2="21.8" y2="21.8"/>
  </g>
  
  <!-- varahi Text -->
  <text x="50" y="25" font-family="Monaco, Consolas, monospace" font-size="20" font-weight="700" 
        fill="#374151" letter-spacing="0.2em" transform="scale(0.8,1.25)">varahi</text>
</svg>