<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#2563eb" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer circle with gradient -->
  <circle cx="20" cy="20" r="19" fill="url(#iconGradient)" filter="url(#dropShadow)"/>
  
  <!-- Inner white circle -->
  <circle cx="20" cy="20" r="17" fill="white"/>
  
  <!-- Neural network pattern -->
  <g opacity="0.9">
    <!-- Central node -->
    <circle cx="20" cy="20" r="3" fill="#f59e0b"/>
    <!-- Outer nodes -->
    <circle cx="13" cy="13" r="2.5" fill="#2563eb"/>
    <circle cx="27" cy="13" r="2.5" fill="#059669"/>
    <circle cx="13" cy="27" r="2.5" fill="#059669"/>
    <circle cx="27" cy="27" r="2.5" fill="#2563eb"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#3b82f6" stroke-width="1.2" opacity="0.6" fill="none">
    <line x1="15" y1="15" x2="17.5" y2="17.5"/>
    <line x1="25" y1="15" x2="22.5" y2="17.5"/>
    <line x1="15" y1="25" x2="17.5" y2="22.5"/>
    <line x1="25" y1="25" x2="22.5" y2="22.5"/>
  </g>
  
  <!-- Micro animation dot -->
  <circle cx="34" cy="6" r="2" fill="#059669" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>