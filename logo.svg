<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand gradient matching site colors -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient for subtle highlights -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Dark professional background -->
  <rect width="100%" height="100%" fill="#18181b"/>

  <!-- Circular logo mark with brand gradient -->
  <circle cx="120" cy="150" r="45" fill="url(#brandGradient)"/>
  
  <!-- Clean "V" letter inside circle -->
  <path d="M105 125 L120 175 L135 125" 
        fill="none" 
        stroke="#18181b" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- VARAHI text - clean, professional typography -->
  <text x="190" y="165" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="48" 
        fill="url(#brandGradient)" 
        font-weight="600"
        letter-spacing="2px">VARAHI</text>

  <!-- Elegant underline -->
  <line x1="190" y1="180" x2="480" y2="180" 
        stroke="url(#brandGradient)" 
        stroke-width="2"/>

  <!-- GROUP subtitle with proper spacing -->
  <text x="335" y="205" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="16" 
        fill="#71717a" 
        font-weight="400"
        letter-spacing="3px">GROUP</text>

  <!-- Decorative accent lines -->
  <line x1="280" y1="205" x2="310" y2="205" 
        stroke="url(#accentGradient)" 
        stroke-width="1.5"/>
  <line x1="360" y1="205" x2="390" y2="205" 
        stroke="url(#accentGradient)" 
        stroke-width="1.5"/>

</svg>