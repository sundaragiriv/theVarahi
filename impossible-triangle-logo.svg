<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the circular V mark -->
    <linearGradient id="vGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    
    <!-- Gradients for impossible triangles -->
    <linearGradient id="impossibleGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9" />
      <stop offset="100%" style="stop-color:#0284c7" />
    </linearGradient>
    <linearGradient id="impossibleGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7" />
      <stop offset="100%" style="stop-color:#0369a1" />
    </linearGradient>
    <linearGradient id="impossibleGradient3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0369a1" />
      <stop offset="100%" style="stop-color:#0ea5e9" />
    </linearGradient>
    
    <!-- Text gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9" />
      <stop offset="50%" style="stop-color:#0284c7" />
      <stop offset="100%" style="stop-color:#0369a1" />
    </linearGradient>
  </defs>
  
  <!-- Yellow circular V mark -->
  <circle cx="30" cy="60" r="24" fill="url(#vGradient)" />
  <text x="30" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a202c">V</text>
  
  <!-- VARAHI text with impossible triangle A's -->
  <g transform="translate(70, 20)">
    <!-- V -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#textGradient)">V</text>
    
    <!-- First A - Impossible Triangle -->
    <g transform="translate(30, 10)">
      <!-- Left face -->
      <path d="M12 5 L4 35 L7 35 L12 17.5 Z" fill="url(#impossibleGradient1)" />
      <!-- Right face -->
      <path d="M12 5 L12 17.5 L13 35 L16 35 Z" fill="url(#impossibleGradient2)" />
      <!-- Bottom face -->
      <path d="M7 35 L13 35 L16 35 L15 42.5 L5 42.5 L4 35 Z" fill="url(#impossibleGradient3)" />
      <!-- Inner cutout -->
      <path d="M12 17.5 L7 35 L13 35 Z" fill="#f8fafc" />
    </g>
    
    <!-- R -->
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#textGradient)">R</text>
    
    <!-- Second A - Impossible Triangle -->
    <g transform="translate(80, 10)">
      <!-- Left face -->
      <path d="M12 5 L4 35 L7 35 L12 17.5 Z" fill="url(#impossibleGradient1)" />
      <!-- Right face -->
      <path d="M12 5 L12 17.5 L13 35 L16 35 Z" fill="url(#impossibleGradient2)" />
      <!-- Bottom face -->
      <path d="M7 35 L13 35 L16 35 L15 42.5 L5 42.5 L4 35 Z" fill="url(#impossibleGradient3)" />
      <!-- Inner cutout -->
      <path d="M12 17.5 L7 35 L13 35 Z" fill="#f8fafc" />
    </g>
    
    <!-- H -->
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#textGradient)">H</text>
    
    <!-- I -->
    <text x="130" y="40" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#textGradient)">I</text>
  </g>
  
  <!-- GROUP text -->
  <text x="70" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="url(#textGradient)" letter-spacing="3px">GROUP</text>
  
  <!-- Decorative lines -->
  <line x1="60" y1="85" x2="120" y2="85" stroke="url(#textGradient)" stroke-width="2"/>
  <line x1="180" y1="85" x2="240" y2="85" stroke="url(#textGradient)" stroke-width="2"/>
</svg>